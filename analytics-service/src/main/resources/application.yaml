spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: analytics-group-v1
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.garima.analytics_service.event.OrderCreatedEvent

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/analyticsdb}
    username: ${DB_USERNAME:analyticsuser}
    password: ${DB_PASSWORD:analytics123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true